# "Now playing" card, driven by the MPRIS source (Cider). The card appears only on a TRACK CHANGE
# and auto-dismisses after `timeout_ms`, the thin bar counting that lifetime down (KDE-style) — it
# is NOT the song's playback position. Updates collapse onto one live surface via replace_key, so a
# new track MORPHs the island instead of stacking. Layout mirrors the Apple-style toast: album art
# on the left, title + artist stacked on the right, with a thin rounded lifetime bar beneath.

[type]
name = "song"
priority = 40
timeout_ms = 4000              # how long the card lingers after a track change; the bar counts it down
anim_profile = "island_soft"
replace_key = "mpris:single"

[fields]
title    = { type = "string", required = true }
artist   = { type = "string", default = "" }
album    = { type = "string", default = "" }
art      = { type = "image",  required = false }

[layout]
kind = "row"
padding = [10, 14]
align = "center"

  [[layout.children]]
  kind = "leaf"
  primitive = "image"
  binding = "art"
  fit = "cover"
  radius = 6.0

  [[layout.children]]
  kind = "column"
  weight = 1.0
  padding = [0, 12]

    [[layout.children.children]]
    kind = "leaf"
    primitive = "marquee"          # scroll long titles
    binding = "{title}"
    style = "title"
    speed_px_s = 30.0

    [[layout.children.children]]
    kind = "leaf"
    primitive = "text"
    binding = "{artist}"
    style = "subtitle"

    [[layout.children.children]]
    kind = "leaf"
    primitive = "progress"         # thin, rounded; reflects the notification's remaining lifetime
    value = "lifetime"             # reserved source: renderer counts it down 1→0 over timeout_ms
    style = "bar"
